name: Update dashboard

on:
  schedule:
    # NSE closes 15:30 IST = 10:00 UTC. Run at 11:00 UTC on weekdays (Mon-Fri).
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Generate dashboard
        run: python dashboard/generate.py

      - name: Commit refreshed docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ dashboard/fundamentals_cache.json
          git commit -m "chore: refresh dashboard $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
